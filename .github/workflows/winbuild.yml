name: Build Windows Release Installer

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      APP_PROJECT: InkscapeTileMaker/InkscapeTileMaker.csproj
      TEST_PROJECT: InkscapeTileMaker.Models.Tests/InkscapeTileMaker.Models.Tests.csproj
      TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
      RUNTIME_ID: win-x64
      PUBLISH_DIR: Output/InkscapeTileMaker/Release/net10.0-windows10.0.19041.0/win-x64
      INSTALLER_PATH: Output/InkscapeTileMakerInstaller.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Windows workload
        shell: pwsh
        run: dotnet workload install maui-windows --skip-sign-check

      - name: Get version from tag
        id: get_version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag.StartsWith("v")) { $tag = $tag.Substring(1) }
          echo "version=$tag" >> $env:GITHUB_OUTPUT

      - name: Restore app dependencies
        shell: pwsh
        run: dotnet restore $env:APP_PROJECT -f $env:TARGET_FRAMEWORK -r $env:RUNTIME_ID

      - name: Restore test dependencies
        shell: pwsh
        run: dotnet restore $env:TEST_PROJECT

      - name: Run model tests
        shell: pwsh
        run: dotnet test $env:TEST_PROJECT -c Release --no-restore

      - name: Publish InkscapeTileMaker
        shell: pwsh
        run: |
          $publishDir = "$env:PUBLISH_DIR\"
          dotnet publish $env:APP_PROJECT -c Release -f $env:TARGET_FRAMEWORK -r $env:RUNTIME_ID --no-restore -p:PublishDir=$publishDir

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: iscc scripts/wininstaller.iss /dMyAppVersion=${{ steps.get_version.outputs.version }}

      - name: Verify installer
        shell: pwsh
        run: |
          if (-not (Test-Path $env:INSTALLER_PATH)) {
            Write-Error "Installer not found at $env:INSTALLER_PATH"
            exit 1
          }

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.version }}"
          Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath "InkscapeTileMaker-win-x64-v$version.zip"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Output/InkscapeTileMakerInstaller.exe
            InkscapeTileMaker-win-x64-v${{ steps.get_version.outputs.version }}.zip
          fail_on_unmatched_files: true
          tag_name: ${{ github.ref_name }}
          name: "InkscapeTileMaker ${{ steps.get_version.outputs.version }}"
          draft: false
          prerelease: false
          append_body: false
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
